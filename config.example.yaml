# ~/.vioscope/config.yaml
#
# API keys are read from environment variables — do NOT put real keys here.
# Set the relevant key in your shell or .env file:
#   ANTHROPIC_API_KEY, OPENROUTER_API_KEY, OPENAI_API_KEY, GOOGLE_API_KEY

# --- Anthropic example ---
model:
  provider: anthropic
  model_id: claude-sonnet-4-6
  temperature: 0.2
  max_tokens: 4096

# --- OpenRouter alternative (uncomment and remove the block above) ---
# model:
#   provider: openrouter
#   model_id: openai/gpt-4o

knowledge_base:
  local_path: ~/.vioscope/kb
  gitbook:
    enabled: true
    space_id: "your-space-id"
    # token read from GITBOOK_PAT env var
    vioscope_root: "/vioscope"
  internal_wiki:
    enabled: false
    mcp_server: "http://localhost:8765"

agents:
  scout:
    model:
      provider: anthropic
      model_id: claude-haiku-4-5-20251001
      temperature: 0.1
      max_tokens: 2048
    max_papers: 50
    databases: [semantic_scholar, arxiv, pubmed, openalex]
    citation_verify: true

  synth:
    model:
      temperature: 0.25
      max_tokens: 4096

  spark:
    model:
      provider: anthropic
      model_id: claude-opus-4-6
      temperature: 0.7
      max_tokens: 4096
    debate_roles: [innovator, pragmatist, contrarian]
    max_pivot_rounds: 3

  skeptic:
    default_mode: constructive

  scribe:
    # Uncomment to override provider:
    # model:
    #   provider: openrouter
    #   model_id: openai/gpt-4o
    default_template: neurips

  steward:
    model:
      provider: anthropic
      model_id: claude-haiku-4-5-20251001
      temperature: 0.1
      max_tokens: 2048

plugins:
  enabled: []
